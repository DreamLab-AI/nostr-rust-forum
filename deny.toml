# cargo-deny configuration for nostr-rust-forum (nostr-bbs-rs kit)
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Analyse all workspace members and their dependencies.
all-features = true

# ---------------------------------------------------------------------------
# Advisories — check against the RustSec advisory database
# ---------------------------------------------------------------------------
[advisories]
# Fail CI on any known vulnerability.
vulnerability = "deny"
# Allow-list specific advisories here if needed (e.g. waiting on upstream fix):
# ignore = ["RUSTSEC-2024-XXXX"]

# ---------------------------------------------------------------------------
# Licences — allowlist of acceptable SPDX identifiers
# ---------------------------------------------------------------------------
[licenses]
# Unlicensed crates are blocked.
unlicensed = "deny"
# Default action for licences not on the allow list.
default = "deny"

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]

# Ring uses a custom licence that is functionally ISC.
[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# Some crates use Unicode-3.0 which supersedes Unicode-DFS-2016.
[[licenses.clarify]]
name = "unicode-ident"
expression = "(MIT OR Apache-2.0) AND Unicode-3.0"
license-files = [{ path = "LICENSE-UNICODE", hash = 0x3fb01745 }]

# ---------------------------------------------------------------------------
# Bans — duplicate crate detection
# ---------------------------------------------------------------------------
[bans]
# Multiple versions of the same crate bloat the WASM output.
# Warn for now; tighten to "deny" once duplicates are resolved.
multiple-versions = "warn"
# Wildcards in version requirements are sloppy.
wildcards = "deny"
# Allow specific duplicates that are hard to unify (transitive deps):
# allow-wildcard-paths = true
# skip = []

# ---------------------------------------------------------------------------
# Sources — restrict where crates may be fetched from
# ---------------------------------------------------------------------------
[sources]
# Only crates.io and workspace path deps are permitted.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
