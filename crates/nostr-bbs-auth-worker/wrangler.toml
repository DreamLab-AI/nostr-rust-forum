name = "nostr-bbs-auth-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-09-01"

[build]
command = "worker-build --release"

[[d1_databases]]
binding = "DB"
database_name = "nostr-bbs-auth"
database_id = "e3981999-e8f0-4c07-9e4b-2e50859b8524"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "SESSIONS"
id = "901345296c2848788066686aa67d5909"

# Retained for backwards-compat reads. Admin-flag writes go to ADMIN_KV
# (split per audit H6 — pod-worker and auth-worker no longer share an
# admin-trust namespace).
[[kv_namespaces]]
binding = "POD_META"
id = "8ec8759ab40d4709a831bf6b0e5241eb"

# Admin checks now use D1 (members.is_admin / whitelist.is_admin).
# ADMIN_KV namespace eliminated — no provisioning needed.

# Legacy alias used by admins.rs cache (60-second admin pubkey list).
[[kv_namespaces]]
binding = "KV"
id = "901345296c2848788066686aa67d5909"

[[r2_buckets]]
binding = "PODS"
bucket_name = "nostr-bbs-pods"

[vars]
RP_ID = "example.com"
RP_NAME = "Nostr BBS"
EXPECTED_ORIGIN = "https://example.com"
