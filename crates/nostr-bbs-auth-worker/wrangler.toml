name = "nostr-bbs-auth-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-09-01"

[build]
command = "worker-build --release"

[[d1_databases]]
binding = "DB"
database_name = "nostr-bbs-auth"
database_id = "e3981999-e8f0-4c07-9e4b-2e50859b8524"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "SESSIONS"
id = "901345296c2848788066686aa67d5909"

# Retained for backwards-compat reads. Admin-flag writes go to ADMIN_KV
# (split per audit H6 — pod-worker and auth-worker no longer share an
# admin-trust namespace).
[[kv_namespaces]]
binding = "POD_META"
id = "8ec8759ab40d4709a831bf6b0e5241eb"

# Admin KV (auth-worker is the read/write authority).
# TODO(ops): provision a fresh namespace via `wrangler kv:namespace create
# nostr-bbs-admin-kv` and replace the placeholder id below.
[[kv_namespaces]]
binding = "ADMIN_KV"
id = "REPLACE_WITH_NEW_ADMIN_KV_ID"

# NIP-98 replay cache. TTL = 2 * tolerance (~120s) per
# nostr_bbs_core::REPLAY_CACHE_TTL_SECS. Production deployments MUST set this.
# TODO(ops): provision via `wrangler kv:namespace create nostr-bbs-nip98-replay`.
[[kv_namespaces]]
binding = "NIP98_REPLAY"
id = "REPLACE_WITH_NEW_NIP98_REPLAY_KV_ID"

# Legacy alias used by admins.rs cache (60-second admin pubkey list).
# Points at SESSIONS today; migrate to ADMIN_KV in a follow-up sprint.
[[kv_namespaces]]
binding = "KV"
id = "901345296c2848788066686aa67d5909"

[[r2_buckets]]
binding = "PODS"
bucket_name = "nostr-bbs-pods"

[vars]
RP_ID = "example.com"
RP_NAME = "Nostr BBS"
EXPECTED_ORIGIN = "https://example.com"
