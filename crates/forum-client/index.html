<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nostr BBS Forum</title>
    <meta name="description" content="Nostr BBS Community Forum — Decentralized, private, Nostr-powered" />
    <meta name="theme-color" content="#111827" />

    <!-- GitHub Pages SPA deep-link restore: picks up redirect from root 404.html -->
    <script>
        (function(){
            var q = new URLSearchParams(window.location.search);
            var redirect = q.get('__p');
            if (redirect) {
                q.delete('__p');
                var qs = q.toString();
                var base = '/community';
                var full = base + redirect + (qs ? '?' + qs : '') + window.location.hash;
                history.replaceState(null, '', full);
            }
        })();
    </script>

    <!-- Favicon: amber diamond -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23fbbf24'/><stop offset='100%25' stop-color='%23d97706'/></linearGradient></defs><polygon points='50,5 95,50 50,95 5,50' fill='url(%23g)' rx='8'/></svg>" type="image/svg+xml" />

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Tailwind Play CDN (development only — production uses Tailwind CLI tree-shaking) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'Avenir', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        amber: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                            950: '#451a03',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Shared design tokens (same source as React marketing site) -->
    <link data-trunk rel="css" href="design-tokens.css" />
    <!-- Forum-specific styles (imports design-tokens.css for @import fallback) -->
    <link data-trunk rel="css" href="style.css" />

    <!-- Trunk WASM bundle injection (workspace: specify package + binary) -->
    <link data-trunk rel="rust" data-wasm-opt="z" data-cargo-package="forum-client" data-bin="forum-client" />
</head>
<body>
    <!-- Loading screen — replaced by Leptos mount_to_body() -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-ring"></div>
        <h1 class="loading-logo gradient-text">Nostr BBS</h1>
        <p class="loading-status">Initializing&hellip;</p>
    </div>

    <noscript>This application requires JavaScript and WebAssembly.</noscript>
</body>
</html>
