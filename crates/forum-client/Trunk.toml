[build]
target = "index.html"
dist = "../../dist"

[watch]
watch = ["src", "../nostr-core/src"]

[serve]
address = "127.0.0.1"
port = 8080

# Optimize WASM binary size (30-50% reduction).
# Trunk downloads wasm-opt automatically via [tools]; no separate hook needed.
[tools]
wasm_opt = "version_122"

# WebGPU particle system JS module — copied to dist/js/ for wasm-bindgen import
[[copy]]
src = "js/webgpu-particles.js"
dest = "js/webgpu-particles.js"
