name = "nostr-bbs-search-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-09-01"

[build]
command = "worker-build --release"

[[r2_buckets]]
binding = "VECTORS"
bucket_name = "nostr-bbs-vectors"

[[kv_namespaces]]
binding = "SEARCH_CONFIG"
id = "440b1f07ff224fb8ad644e094c6766c0"

# NIP-98 replay cache (TTL = 2 * tolerance window). Shared id with auth-worker.
# TODO(ops): provision via `wrangler kv:namespace create nostr-bbs-nip98-replay`.
# SECURITY TODO: Placeholder IDs now make ingest/admin auth fail closed. Replace this before deploy.
[[kv_namespaces]]
binding = "NIP98_REPLAY"
id = "f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3"

[vars]
ALLOWED_ORIGIN = "https://example.com"
ALLOWED_ORIGINS = "https://example.com"
RVF_STORE_KEY = "nostr-bbs.rvf"
ADMIN_PUBKEYS = "11ed64225dd5e2c5e18f61ad43d5ad9272d08739d3a20dd25886197b0738663c"

[triggers]
crons = ["*/5 * * * *"]
