name = "nostr-bbs-search-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-09-01"

[build]
command = "worker-build --release"

[[r2_buckets]]
binding = "VECTORS"
bucket_name = "nostr-bbs-vectors"

[[kv_namespaces]]
binding = "SEARCH_CONFIG"
id = "440b1f07ff224fb8ad644e094c6766c0"

# D1 database for NIP-98 replay protection (atomic INSERT OR IGNORE).
# Shares the auth-worker's D1 database so cross-worker replay is detected.
[[d1_databases]]
binding = "REPLAY_DB"
database_name = "nostr-bbs-auth"
database_id = "e3981999-e8f0-4c07-9e4b-2e50859b8524"

[vars]
ALLOWED_ORIGIN = "https://example.com"
ALLOWED_ORIGINS = "https://example.com"
RVF_STORE_KEY = "nostr-bbs.rvf"
ADMIN_PUBKEYS = "11ed64225dd5e2c5e18f61ad43d5ad9272d08739d3a20dd25886197b0738663c"

[triggers]
crons = ["*/5 * * * *"]
