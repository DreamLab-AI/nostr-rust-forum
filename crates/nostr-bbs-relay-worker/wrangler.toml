name = "nostr-bbs-relay"
main = "build/worker/shim.mjs"
compatibility_date = "2025-09-01"

[build]
command = "worker-build --release"

[vars]
RELAY_NAME = "Nostr BBS Relay"
# NOTE: the relay sources admin status from D1 (whitelist.is_admin), not from
# an env var — there is no ADMIN_PUBKEYS reader in src/. A dead ADMIN_PUBKEYS=""
# var was removed here (Gap 2) to avoid implying the relay has a static admin
# set that diverges from the auth/search workers.
ALLOWED_ORIGIN = "https://example.com"
ALLOWED_ORIGINS = "https://example.com"
# Zone access config (JSON array of zone definitions consumed at ingress).
# Empty array = no extra zone gating; operators overlay via forum-config/.
ZONE_CONFIG = "[]"
# Revocable device keys (ADR-099). Exact string "true" enables; default off.
# Must match the auth-worker and the client window.__ENV__ to take effect.
DEVICE_KEYS_ENABLED = "false"

# Mesh federation (PRD-010 Phase 3 / ADR-073)
MESH_MODE               = "standalone"
MESH_PEER_RELAYS        = ""
MESH_FEDERATED_KINDS    = "1,1059,30001,30050,30078,30910,31400,31401,31402,31403,31404,31405,38000,38100"
MESH_ALLOWED_REMOTE_DIDS = ""

[[d1_databases]]
binding = "DB"
database_name = "nostr-bbs-relay"
database_id = "97c77d23-0e24-4325-ada7-1747eab4095b"
migrations_dir = "migrations"

# P0-03 fix: NIP-98 replay protection uses the shared auth-worker D1
# database (nostr-bbs-auth) so cross-worker replay is detected. The
# relay's own DB binding (nostr-bbs-relay) does not contain the
# nip98_replay table.
[[d1_databases]]
binding = "REPLAY_DB"
database_name = "nostr-bbs-auth"
database_id = "e3981999-e8f0-4c07-9e4b-2e50859b8524"

[durable_objects]
bindings = [
  { name = "RELAY", class_name = "NostrRelayDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NostrRelayDO"]

[triggers]
crons = ["*/5 * * * *"]
