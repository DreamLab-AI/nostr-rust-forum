[package]
name = "nostr-bbs-pod-worker"
version = "3.0.0-rc3"
edition = "2021"
description = "Pod Worker: Solid pods + R2 storage + WAC ACL (nostr-bbs)"

[lib]
crate-type = ["cdylib"]

[dependencies]
nostr-bbs-core = { workspace = true }
worker = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
base64 = { workspace = true }
js-sys = { workspace = true }
async-trait = { workspace = true }

# proptest is native-only (rusty-fork → wait-timeout); the worker target is
# wasm32, so we gate dev-deps behind cfg(not(wasm32)) to avoid breaking
# `cargo check --target wasm32-unknown-unknown`.
[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
proptest = { workspace = true }
