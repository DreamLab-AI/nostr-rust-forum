name = "nostr-bbs-pod-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-09-01"

[build]
command = "worker-build --release"

[[r2_buckets]]
binding = "PODS"
bucket_name = "nostr-bbs-pods"

# Pod metadata KV (storage of WAC ACLs, quota counters, etc.). NO admin-flag
# entries should be written here — those live in ADMIN_KV_RO (split per
# audit H6).
[[kv_namespaces]]
binding = "POD_META"
id = "8ec8759ab40d4709a831bf6b0e5241eb"

# Admin KV (read-only mirror of the auth-worker ADMIN_KV namespace). The
# pod-worker only needs `is_admin_user` lookups; it MUST NOT have write
# access to the admin set.
# TODO(ops): bind to the same id provisioned for auth-worker's ADMIN_KV.
[[kv_namespaces]]
binding = "ADMIN_KV_RO"
id = "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4"

# NIP-98 replay cache (shared with auth-worker; same id).
# TODO(ops): provision a fresh namespace.
# SECURITY TODO: Placeholder IDs now make NIP-98 protected pod requests fail closed.
[[kv_namespaces]]
binding = "NIP98_REPLAY"
id = "f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3"

[vars]
EXPECTED_ORIGIN = "https://example.com"
PAY_ENABLED = "false"
PAY_COST_SATS = "1"
