name = "nostr-bbs-pod-api"
main = "build/worker/shim.mjs"
compatibility_date = "2025-09-01"

[build]
command = "worker-build --release"

[[r2_buckets]]
binding = "PODS"
bucket_name = "nostr-bbs-pods"

# Pod metadata KV (storage of WAC ACLs, quota counters, etc.). NO admin-flag
# entries should be written here — those live in ADMIN_KV_RO (split per
# audit H6).
[[kv_namespaces]]
binding = "POD_META"
id = "8ec8759ab40d4709a831bf6b0e5241eb"

# Admin checks now use D1 (members.is_admin / whitelist.is_admin) via the
# shared REPLAY_DB binding. ADMIN_KV_RO namespace eliminated.

# D1 database for NIP-98 replay protection (atomic INSERT OR IGNORE).
# Shares the auth-worker's D1 database so cross-worker replay is detected.
[[d1_databases]]
binding = "REPLAY_DB"
database_name = "nostr-bbs-auth"
database_id = "e3981999-e8f0-4c07-9e4b-2e50859b8524"

[vars]
EXPECTED_ORIGIN = "https://example.com"
PAY_ENABLED = "false"
PAY_COST_SATS = "1"
