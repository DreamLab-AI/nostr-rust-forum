<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BBS // nostr-rust-forum</title>
    <meta name="description" content="Retro ASCII/BBS terminal interface for the Nostr forum kit." />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230a0a0a'/><text x='1' y='13' font-family='monospace' font-size='12' fill='%23ffb000'>&gt;_</text></svg>" type="image/svg+xml" />
    <link data-trunk rel="css" href="assets/bbs.css" />
    <!-- UA 571-C sentry-gun door-game sound effects (copied verbatim to dist). -->
    <link data-trunk rel="copy-dir" href="assets/sentry-sounds" />

    <!-- Zone-bound PWA install surface (ADR-109). The manifest, icons/ dir, and
         the network-first service worker are copied verbatim into
         dist/community/bbs/; the SW is registered from Rust (crate::pwa::register_sw)
         so scope + guards live in one place. `name`/`short_name` are the neutral
         kit defaults — the operator overlay brands them at deploy time. -->
    <link data-trunk rel="copy-file" href="manifest.webmanifest" />
    <link data-trunk rel="copy-dir" href="assets/icons" />
    <link data-trunk rel="copy-file" href="bbs-sw.js" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="BBS" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <!-- Branding is injected by the host site into window.__ENV__ (THEME,
         NODE_NAME, LOCATION, BANNER_URL, RELAY_URL, ZONE_CONFIG). The defaults
         below let the BBS render standalone (e.g. `trunk serve`). -->
    <script>
      window.__ENV__ = window.__ENV__ || {
        THEME: "amber",
        NODE_NAME: "NOSTR-BBS",
        LOCATION: "the decentralized frontier",
        RELAY_URL: "",
        ZONE_CONFIG: ""
      };
    </script>
</head>
<body>
    <noscript>This BBS requires a WebAssembly-capable browser.</noscript>

    <!-- Phosphor persistence: when the terminal text changes, the previous
         frame lingers as a faint afterglow and fades (see .phosphor-ghost in
         bbs.css). A pure DOM overlay — a text-only clone of the prior screen
         body — so it adds nothing to the WASM bundle and degrades gracefully. -->
    <script>
      (function () {
        try {
          if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        } catch (e) {}
        var THROTTLE_MS = 90, MAX_GHOSTS = 6, LIFE_MS = 3100;
        function start(root) {
          var prev = null, last = 0, live = [];
          function bodyEls() {
            var ch = Array.prototype.slice.call(root.children);
            var b = ch.findIndex(function (c) { return c.classList && c.classList.contains('bbs-banner'); });
            var f = ch.findIndex(function (c) { return c.classList && c.classList.contains('bbs-footer'); });
            return ch.slice(b + 1, f === -1 ? ch.length : f);
          }
          function snap() {
            var els = bodyEls(); if (!els.length) return null;
            var rs = els.map(function (e) { return e.getBoundingClientRect(); });
            var left = Math.min.apply(null, rs.map(function (r) { return r.left; }));
            var top = Math.min.apply(null, rs.map(function (r) { return r.top; }));
            var right = Math.max.apply(null, rs.map(function (r) { return r.right; }));
            var bottom = Math.max.apply(null, rs.map(function (r) { return r.bottom; }));
            return { html: els.map(function (e) { return e.outerHTML; }).join(''),
                     left: left, top: top, w: right - left, h: bottom - top,
                     font: getComputedStyle(root).font };
          }
          function ghost(p) {
            var g = document.createElement('div');
            g.className = 'phosphor-ghost';
            g.style.cssText = 'left:' + p.left + 'px;top:' + p.top + 'px;width:' + p.w + 'px;height:' + p.h + 'px;font:' + p.font;
            g.innerHTML = p.html;
            // Text-only afterglow: drop heavy ASCII-image clones so ghosts stay light.
            var imgs = g.querySelectorAll('.ascii-img-wrap, .ascii-img, .bbs-section-hero');
            for (var i = 0; i < imgs.length; i++) imgs[i].remove();
            document.body.appendChild(g);
            live.push(g);
            while (live.length > MAX_GHOSTS) { var o = live.shift(); if (o) o.remove(); }
            requestAnimationFrame(function () { g.style.opacity = '0'; }); // next frame → transition
            setTimeout(function () { g.remove(); var k = live.indexOf(g); if (k >= 0) live.splice(k, 1); }, LIFE_MS);
          }
          function tick() {
            var cur = snap();
            if (cur && prev && prev.html !== cur.html) {
              var now = performance.now();
              if (now - last > THROTTLE_MS) { ghost(prev); last = now; }
            }
            if (cur) prev = cur;
            requestAnimationFrame(tick);
          }
          requestAnimationFrame(tick);
        }
        var iv = setInterval(function () {
          var root = document.querySelector('.bbs-root');
          if (root) { clearInterval(iv); start(root); }
        }, 80);
        setTimeout(function () { clearInterval(iv); }, 20000);
      })();
    </script>

    <!-- Touch navigation: slide a finger over the menu/list to move the
         highlight, lift to select. A thin bridge onto the existing keyboard
         model — it hit-tests the item under the touch and drives the app's own
         ArrowUp/ArrowDown/Enter handlers, so every screen behaves identically
         to the keyboard. No-op without touch (mouse never fires these). -->
    <script>
      (function () {
        function selectable() {
          return Array.prototype.slice.call(document.querySelectorAll('.bbs-menu-item, .bbs-row'));
        }
        function fire(key) { document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true })); }
        function itemAt(x, y) { var el = document.elementFromPoint(x, y); return el ? el.closest('.bbs-menu-item, .bbs-row') : null; }
        var lastIdx = -1, active = false, over = false;
        function curIndex(items) {
          if (lastIdx >= 0) return lastIdx;            // track in JS — the DOM `.selected` lags the re-render
          var d = items.findIndex(function (e) { return e.classList.contains('selected'); });
          return d < 0 ? 0 : d;
        }
        function moveTo(item) {
          var items = selectable();
          var target = items.indexOf(item);
          if (target < 0) return false;
          var cur = curIndex(items);
          if (target !== cur) {
            var key = target > cur ? 'ArrowDown' : 'ArrowUp';
            for (var i = 0; i < Math.abs(target - cur); i++) fire(key);
          }
          lastIdx = target;
          item.scrollIntoView({ block: 'nearest' });
          return true;
        }
        document.addEventListener('touchstart', function (e) {
          var t = e.touches[0]; if (!t) return;
          lastIdx = -1;
          var it = itemAt(t.clientX, t.clientY);
          if (!it) { active = false; return; }
          active = true; over = true; moveTo(it);
        }, { passive: true });
        document.addEventListener('touchmove', function (e) {
          if (!active) return;
          var t = e.touches[0]; if (!t) return;
          var it = itemAt(t.clientX, t.clientY);
          if (it) { over = true; if (moveTo(it)) e.preventDefault(); } else { over = false; }
        }, { passive: false });
        document.addEventListener('touchend', function () {
          if (active && over) fire('Enter');
          active = false; lastIdx = -1;
        }, { passive: true });
      })();
    </script>

    <!-- Home gesture: a swipe down from the top (not starting on a list row, so
         it never clashes with the slide-to-select above) jumps back to the main
         menu — the full options list — from any sub-screen. The only touch way
         "back" on mobile, since there is no ESC key. -->
    <script>
      (function () {
        function key(k) { document.dispatchEvent(new KeyboardEvent('keydown', { key: k, bubbles: true })); }
        function onMenu() { var f = document.querySelector('.bbs-footer'); return f && /Main Menu/.test(f.textContent || ''); }
        function goHome() { var n = 0; (function step() { if (onMenu() || n++ > 12) return; key('Escape'); setTimeout(step, 70); })(); }
        var sy = 0, sx = 0, arm = false;
        document.addEventListener('touchstart', function (e) {
          var t = e.touches[0]; if (!t) return;
          sy = t.clientY; sx = t.clientX;
          arm = sy < 60 && !(e.target.closest && e.target.closest('.bbs-menu-item, .bbs-row'));
        }, { passive: true });
        document.addEventListener('touchend', function (e) {
          var t = e.changedTouches[0]; if (!t || !arm) return;
          var dy = t.clientY - sy, dx = t.clientX - sx;
          if (dy > 50 && Math.abs(dy) > Math.abs(dx)) goHome();
        }, { passive: true });
      })();
    </script>

    <!-- Door game: UA 571-C remote sentry weapon system. A faithful Aliens
         (1986) control deck in OUR phosphor skin — pure client-side, no auth,
         no relay. Opened by a `bbs:sentry` event (Door Games launch / /sentry
         command). Sounds adapted from the MIT-licensed CentriGUI project. -->
    <script>
      (function () {
        var SND = 'sentry-sounds/', audio = {};
        function snd(n) { if (!audio[n]) { var a = new Audio(SND + n + '.opus'); a.preload = 'auto'; audio[n] = a; } return audio[n]; }
        function play(n, o) { try { var a = snd(n); a.loop = !!(o && o.loop); a.volume = (o && o.volume) != null ? o.volume : 1; a.currentTime = 0; a.play().catch(function(){}); } catch (e) {} }
        function stop(n) { var a = audio[n]; if (a) { a.pause(); a.currentTime = 0; a.loop = false; } }

        var MODES = [
          ['system', 'SYSTEM MODE', ['AUTO-REMOTE', 'MAN-OVERRIDE', 'SEMI-AUTO']],
          ['weapon', 'WEAPON', ['SAFE', 'ARMED']],
          ['iff', 'IFF', ['SEARCH', 'TEST', 'ENGAGED', 'INTERROGATE']],
          ['profile', 'TARGET PROFILE', ['SOFT', 'STANDARD', 'HARD']],
          ['spectral', 'SPECTRAL', ['BIO', 'INERT']],
          ['select', 'TARGET SELECT', ['MULTI-SPEC', 'INFRA-RED', 'UV']]
        ];
        var BOOT = [
          '> UA 571-C REMOTE SENTRY WEAPON SYSTEM',
          '> FIRMWARE 2.7.0  ::  WEYLAND-YUTANI CORP',
          '> INITIATING SYSTEM CHECK ...........  OK',
          '> SERVO MOTORS / TRAVERSE ..........  OK',
          '> TARGETING ARRAY / IR-UV-MULTISPEC   OK',
          '> AMMUNITION FEED  500 / 500 .......  OK',
          '> IFF TRANSPONDER ..................  OK',
          '> WEAPON SAFE  ::  AWAITING OPERATOR'
        ];
        var el = null, state = null, fireTimer = null, bootTimer = null;

        function curTheme() { var c = document.querySelector('.bbs-crt'); var m = c && c.className.match(/theme-\w+/); return m ? m[0] : 'theme-amber'; }
        function build() {
          el = document.createElement('div');
          el.className = 'sentry bbs-crt ' + curTheme();
          el.setAttribute('role', 'dialog'); el.setAttribute('aria-label', 'UA 571-C sentry weapon system');
          el.innerHTML =
            '<div class="sentry-close" data-act="close" role="button" tabindex="0">[ X ] CLOSE</div>' +
            '<div class="sentry-inner">' +
              '<pre class="sentry-boot" id="sentry-boot"></pre>' +
              '<div id="sentry-deck" style="display:none">' +
                '<div class="sentry-title">UA 571-C  //  REMOTE SENTRY WEAPON SYSTEM</div>' +
                '<div class="sentry-modes" id="sentry-modes"></div>' +
                '<div class="sentry-status">' +
                  '<div class="sentry-box"><div class="lab">ROUNDS REMAINING</div><div class="sentry-rounds" id="s-rounds">500</div></div>' +
                  '<div class="sentry-box"><div class="lab">TIME AT 100% (s)</div><div class="sentry-time" id="s-time">33.33</div></div>' +
                  '<div class="sentry-box"><div class="sentry-critical" id="s-crit">CRITICAL</div></div>' +
                  '<div class="sentry-box sentry-gaugewrap">' +
                    '<div class="sentry-gauge" id="s-temp"><span class="gl">TEMP</span><div class="fill" style="height:30%"></div></div>' +
                    '<div class="sentry-radar" id="s-radar"><div class="ring"></div><div class="ring r2"></div></div>' +
                  '</div>' +
                '</div>' +
                '<div class="sentry-actions">' +
                  '<div class="sentry-btn" data-act="arm" role="button" tabindex="0">ARM</div>' +
                  '<div class="sentry-btn" data-act="fire" role="button" tabindex="0">ENGAGE</div>' +
                  '<div class="sentry-btn" data-act="reload" role="button" tabindex="0">RELOAD</div>' +
                  '<div class="sentry-btn" data-act="diag" role="button" tabindex="0">DIAGNOSTIC</div>' +
                '</div>' +
                '<div class="sentry-log" id="sentry-log" aria-live="polite"></div>' +
                '<div class="sentry-hint">select modes · ARM then ENGAGE to open fire · ESC to exit</div>' +
              '</div>' +
            '</div>';
          document.body.appendChild(el);
          var mc = el.querySelector('#sentry-modes');
          MODES.forEach(function (m) {
            var cell = document.createElement('div'); cell.className = 'sentry-cell';
            cell.innerHTML = '<div class="lab">' + m[1] + '</div><div class="sentry-opts"></div>';
            var wrap = cell.querySelector('.sentry-opts');
            m[2].forEach(function (v, i) {
              var o = document.createElement('div');
              o.className = 'sentry-opt' + (i === 0 ? ' sel' : '') + (m[0] === 'weapon' && v === 'ARMED' ? ' danger' : '');
              o.setAttribute('data-grp', m[0]); o.setAttribute('data-val', v); o.textContent = v;
              wrap.appendChild(o);
            });
            mc.appendChild(cell);
          });
          el.addEventListener('click', onClick);
          el.addEventListener('keydown', function (e) {
            var a = e.target.getAttribute && e.target.getAttribute('data-act');
            if (a && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); onClick(e); }
          });
        }
        function log(msg, hi) { var l = el.querySelector('#sentry-log'); var d = document.createElement('div'); if (hi) d.className = 'hi'; d.textContent = '> ' + msg; l.appendChild(d); l.scrollTop = l.scrollHeight; }
        function getSel(grp) { var s = el.querySelector('.sentry-opt.sel[data-grp="' + grp + '"]'); return s ? s.getAttribute('data-val') : null; }
        function selectOpt(grp, val) { el.querySelectorAll('.sentry-opt[data-grp="' + grp + '"]').forEach(function (o) { o.classList.toggle('sel', o.getAttribute('data-val') === val); }); }
        function setRounds(n) { state.rounds = Math.max(0, Math.round(n)); el.querySelector('#s-rounds').textContent = state.rounds; el.querySelector('#s-time').textContent = (state.rounds / 15).toFixed(2); el.querySelector('#s-crit').classList.toggle('on', state.rounds <= 100); }
        function setTemp(t) { state.temp = Math.max(0, Math.min(100, t)); var g = el.querySelector('#s-temp'); g.querySelector('.fill').style.height = state.temp + '%'; g.classList.toggle('hot', state.temp > 80); }

        function onClick(e) {
          var t = e.target, act = t.getAttribute('data-act');
          if (act === 'close') { close(); return; }
          if (t.classList && t.classList.contains('sentry-opt')) {
            var grp = t.getAttribute('data-grp');
            selectOpt(grp, t.getAttribute('data-val'));
            play(grp === 'weapon' ? 'buttonclick' : 'bip', { volume: 0.7 });
            if (grp === 'weapon') { log('WEAPON ' + t.getAttribute('data-val'), true); if (t.getAttribute('data-val') === 'SAFE') ceaseFire(); }
            return;
          }
          if (act === 'arm') { selectOpt('weapon', 'ARMED'); play('buttonclick'); log('WEAPON ARMED', true); }
          else if (act === 'fire') { state && state.firing ? ceaseFire(true) : engage(); }
          else if (act === 'reload') { reload(); }
          else if (act === 'diag') { diagnostic(); }
        }
        function engage() {
          if (getSel('weapon') !== 'ARMED') { play('bip'); log('CANNOT ENGAGE — WEAPON SAFE'); return; }
          if (state.rounds <= 0) { play('bip'); log('CANNOT ENGAGE — NO AMMUNITION'); return; }
          if (state.firing) return;
          state.firing = true; selectOpt('iff', 'ENGAGED');
          el.querySelector('#s-radar').classList.add('fast');
          var b = el.querySelector('[data-act="fire"]'); b.textContent = 'CEASE FIRE'; b.classList.add('armed');
          log('** OPEN FIRE ** TARGET ' + getSel('profile'), true);
          var beat = 0;
          fireTimer = setInterval(function () {
            if (state.rounds <= 0) { setRounds(0); ceaseFire(); play('gameover'); log('** AMMUNITION DEPLETED **', true); selectOpt('weapon', 'SAFE'); return; }
            setRounds(state.rounds - 14); setTemp(state.temp + 4); beat++;
            if (beat % 4 === 0) play('bip', { volume: 0.5 });
            if (state.rounds <= 100 && beat % 2 === 0) play('bip', { volume: 0.85 });
          }, 250);
        }
        function ceaseFire(manual) {
          if (fireTimer) { clearInterval(fireTimer); fireTimer = null; }
          if (!state) return; state.firing = false;
          var b = el.querySelector('[data-act="fire"]'); if (b) { b.textContent = 'ENGAGE'; b.classList.remove('armed'); }
          var r = el.querySelector('#s-radar'); if (r) r.classList.remove('fast');
          if (manual) { play('buttonclick'); log('CEASE FIRE'); }
        }
        function reload() { ceaseFire(); setRounds(500); setTemp(30); selectOpt('weapon', 'SAFE'); selectOpt('iff', 'SEARCH'); play('screenon', { volume: 0.5 }); log('MAGAZINE RELOADED — 500 ROUNDS', true); }
        function diagnostic() {
          play('buttonclick'); log('RUNNING AUTO DIAGNOSTIC ...');
          var step = 0, base = state.temp;
          var iv = setInterval(function () {
            step++; setTemp(step < 10 ? base + step * 6 : Math.max(base, 100 - (step - 10) * 6));
            if (step === 10) log('SERVO / TARGETING / FEED ... ALL NOMINAL');
            if (step >= 20) { clearInterval(iv); setTemp(base); log('DIAGNOSTIC COMPLETE — SYSTEM NOMINAL', true); play('bip'); }
          }, 90);
        }
        function open() {
          if (!el) build();
          el.className = 'sentry bbs-crt ' + curTheme();
          state = { rounds: 500, temp: 30, firing: false };
          el.querySelector('#sentry-deck').style.display = 'none';
          var boot = el.querySelector('#sentry-boot'); boot.textContent = ''; boot.style.display = '';
          el.querySelector('#sentry-log').innerHTML = '';
          el.classList.add('open');
          document.documentElement.style.overflow = 'hidden';
          play('screenon'); play('noisefan', { loop: true, volume: 0.22 });
          var li = 0, ci = 0;
          (function type() {
            if (li >= BOOT.length) { bootTimer = setTimeout(showDeck, 350); return; }
            var line = BOOT[li];
            if (ci < line.length) { boot.textContent += line.charAt(ci); ci++; bootTimer = setTimeout(type, 8); }
            else { boot.textContent += '\n'; li++; ci = 0; bootTimer = setTimeout(type, 90); }
          })();
          el.querySelector('.sentry-close').focus();
        }
        function showDeck() { if (!el || !el.classList.contains('open')) return; el.querySelector('#sentry-boot').style.display = 'none'; el.querySelector('#sentry-deck').style.display = 'block'; setRounds(500); setTemp(30); log('SYSTEM ONLINE — OPERATOR CONTROL', true); }
        function close() {
          if (bootTimer) { clearTimeout(bootTimer); bootTimer = null; }
          ceaseFire(); stop('noisefan'); stop('screenon');
          if (el) el.classList.remove('open');
          document.documentElement.style.overflow = '';
        }
        document.addEventListener('bbs:sentry', open);
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && el && el.classList.contains('open')) { e.stopPropagation(); close(); } }, true);
      })();
    </script>
</body>
</html>
