# Weekly RustSec advisory scan for nostr-rust-forum
#
# Runs on a schedule (Monday 06:17 UTC) and on-demand via workflow_dispatch.
# Also runs on push/PR when Cargo.lock changes (dependency update).
#
# Separate from CI to avoid slowing down the main pipeline — cargo-audit
# fetches the advisory DB on every run.

name: Security Audit

on:
  schedule:
    # Weekly: Monday 06:17 UTC (avoid the :00 stampede)
    - cron: '17 6 * * 1'
  push:
    branches: [main]
    paths:
      - '**/Cargo.lock'
      - '.github/workflows/audit.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.lock'
      - '.github/workflows/audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # RUSTSEC-2026-0185: quinn-proto QUIC out-of-order reassembly DoS. A
      # transitive native dependency only; the kit's shipped surface is
      # wasm32/Cloudflare Workers, which never instantiates a QUIC endpoint.
      - name: cargo audit
        run: >-
          cargo audit --deny warnings
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2024-0384
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2026-0097
          --ignore RUSTSEC-2026-0173
          --ignore RUSTSEC-2026-0185
